name: Deploy Introduce Site

on:
  push:
    branches:
      - main
    paths:
      - 'pangil5634_introduce/**'
      - '.github/workflows/deploy-introduce.yml'
  workflow_dispatch:

concurrency:
  group: deploy-introduce-site
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pangil5634_introduce
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pangil5634_introduce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run deploy
