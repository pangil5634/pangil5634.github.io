name: Deploy Introduce Site

on:
  push:
    branches:
      - main
    paths:
      - 'pangil5634_introduce/**'
      - '.github/workflows/deploy-introduce.yml'
  workflow_dispatch:

concurrency:
  group: deploy-introduce-site
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pangil5634_introduce
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pangil5634_introduce/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pangil5634_introduce/dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
